<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
    
    <div class="block">
        <div class="parent">
            <div id="logo"><span>Logo</span></div>
            <div id="list">
              <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Contact</a></li>
                </ul>
            <div class="btn"><button>Login</button></div>
            </div>
        </div>

        <!--Login form-->
        <div class="form">





            <!--login-->
            <div class="login">
                    <a href=""><i class="fa-solid fa-x"></i></a>
                    <span>Login</span>

                <div class="input">
                    <i class="fa-solid fa-envelope"></i>                    
                    <input id="email" type="email" placeholder="Email">

                    <i class="fa-solid fa-lock"></i>
                    <input id="pass" type="password" placeholder="Password">
                </div>

                <div class="check">
                    <label for="checkbox">
                    <input id="checkbox" type="checkbox">Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>

                    <button>login</button>

                <div class="register">
                    <span>Don't have an account?</span>
                    <a href="#">Register</a>
                </div>
            </div>




            <!--Registration form-->
            <div class="registration">

                <div class="inputReg">
                    <a href=""><i class="fa-solid fa-x"></i></a>
                    <i class="fa-solid fa-user"></i>
                    <input id="textReg" type="text" placeholder="Username">

                    <i class="fa-solid fa-envelope"></i>
                    <input id="emailReg" type="email" placeholder="Email">

                    <i class="fa-solid fa-lock"></i>
                    <input id="passReg" type="password" placeholder="Password">
                </div>

                <div class="checkboxReg">
                    <input id="checkReg" type="checkbox" name="I agree to the tearm & conditions">
                    <span>I agree to the tearm & conditions</span>
                </div>

                <button>Register</button>
                <div class="account">
                    <span>Already have an accound?</span>
                    <a href="#">Login</a>
                </div>

            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
